<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泡泡纸模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        
        .score-board {
            background: rgba(255,255,255,0.9);
            padding: 15px 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .score {
            font-size: 1.5rem;
            color: #333;
            font-weight: bold;
        }
        
        .score span {
            color: #667eea;
            font-size: 2rem;
        }
        
        .bubble-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 10px;
            max-width: 600px;
            width: 100%;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
        }
        
        .bubble {
            aspect-ratio: 1;
            background: radial-gradient(circle at 30% 30%, 
                rgba(255,255,255,0.8) 0%, 
                rgba(255,255,255,0.4) 20%, 
                rgba(100,150,255,0.6) 50%, 
                rgba(100,150,255,0.3) 100%);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 
                inset -5px -5px 10px rgba(0,0,0,0.1),
                inset 5px 5px 10px rgba(255,255,255,0.5),
                0 5px 15px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .bubble::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 15%;
            width: 25%;
            height: 15%;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            transform: rotate(-45deg);
        }
        
        .bubble:hover {
            transform: scale(1.05);
        }
        
        .bubble.popped {
            animation: pop 0.15s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes pop {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.8;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }
        
        .reset-btn {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 1.1rem;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        .message {
            color: white;
            margin-top: 15px;
            font-size: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🫧 泡泡纸模拟器</h1>
    
    <div class="score-board">
        <div class="score">得分：<span id="score">0</span></div>
    </div>
    
    <div class="bubble-container" id="bubbleContainer"></div>
    
    <button class="reset-btn" onclick="resetGame()">再来一局</button>
    
    <div class="message" id="message"></div>
    
    <script>
        let score = 0;
        const totalBubbles = 40;
        
        // Web Audio API 生成泡泡破裂音效
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        function playPopSound() {
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            // 高频短促的声音模拟泡泡破裂
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(100, audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        }
        
        // 创建泡泡
        function createBubbles() {
            const container = document.getElementById('bubbleContainer');
            container.innerHTML = '';
            
            for (let i = 0; i < totalBubbles; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.onclick = () => popBubble(bubble);
                container.appendChild(bubble);
            }
        }
        
        // 戳破泡泡
        function popBubble(bubble) {
            if (bubble.classList.contains('popped')) return;
            
            bubble.classList.add('popped');
            playPopSound();
            
            score += 10;
            updateScore();
            
            // 检查是否全部戳破
            const poppedCount = document.querySelectorAll('.bubble.popped').length;
            if (poppedCount === totalBubbles) {
                document.getElementById('message').textContent = '🎉 太棒了！全部泡泡都戳破了！';
            }
        }
        
        // 更新分数
        function updateScore() {
            document.getElementById('score').textContent = score;
        }
        
        // 重置游戏
        function resetGame() {
            score = 0;
            updateScore();
            document.getElementById('message').textContent = '';
            createBubbles();
        }
        
        // 初始化
        createBubbles();
    </script>
</body>
</html>
